<svg xmlns="http://www.w3.org/2000/svg" viewBox="-44 -14 88 28" width="88" height="28">
  <!-- Inductor symbol - horizontal, pins at ±40, 4 coil humps -->
  <line x1="-40" y1="0" x2="-22" y2="0" stroke="#ffd060" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="0" x2="40" y2="0" stroke="#ffd060" stroke-width="2" stroke-linecap="round"/>
  <!-- Coils (upper semicircles) -->
  <path d="M-21,0 A8,8,0,0,0,-5,0" fill="none" stroke="#ffd060" stroke-width="2" stroke-linecap="round"/>
  <path d="M-12,0 A8,8,0,0,0,4,0" fill="none" stroke="#ffd060" stroke-width="2" stroke-linecap="round"/>
  <path d="M-3,0 A8,8,0,0,0,13,0" fill="none" stroke="#ffd060" stroke-width="2" stroke-linecap="round"/>
  <path d="M6,0 A8,8,0,0,0,22,0" fill="none" stroke="#ffd060" stroke-width="2" stroke-linecap="round"/>
  <circle cx="-40" cy="0" r="3" fill="#ffd060"/>
  <circle cx="40" cy="0" r="3" fill="#ffd060"/>
</svg>
